<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FrameText</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <img src="../icons/icon48.png" alt="FrameText Logo" class="logo">
    <h1>FrameText</h1>
  </div>
  
  <div class="content">
    <button id="captureBtn" class="primary-btn">📸 Capture Frame</button>
    <div id="statusArea" class="status-ready">Ready to capture</div>
    
    <div class="instructions">
      <h3>How to use:</h3>
      <ol>
        <li>Play a video on the current page</li>
        <li>Click "Capture Frame" above</li>
        <li>Draw a box to extract text or download</li>
      </ol>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
