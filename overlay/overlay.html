<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FrameText Overlay</title>
  <link rel="stylesheet" href="overlay.css">
  <!-- Load Tesseract from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
  <div class="overlay-container">
    <div class="top-bar">
      <h2>FrameText — Frame Captured</h2>
      <button id="closeBtn" class="icon-btn" aria-label="Close">✕</button>
    </div>

    <div class="main-content">
      <div class="canvas-wrapper">
        <canvas id="imageCanvas"></canvas>
        <canvas id="cropCanvas"></canvas>
        <div id="selectionBox" class="selection-box">
          <div class="selection-dimensions"></div>
        </div>
      </div>

      <div class="action-panel">
        <div class="tabs">
          <button class="tab-btn active" data-tab="text">Text Mode</button>
          <button class="tab-btn" data-tab="image">Image Mode</button>
        </div>

        <div class="tab-content active" id="textTab">
          <div class="lang-selector">
            <label>Languages (Select multiple):</label>
            <div id="ocrLangGroup" class="checkbox-group">
              <label><input type="checkbox" value="eng" checked> English</label>
              <label><input type="checkbox" value="hin"> Hindi</label>
              <label><input type="checkbox" value="kan"> Kannada</label>
              <label><input type="checkbox" value="tel"> Telugu</label>
              <label><input type="checkbox" value="tam"> Tamil</label>
              <label><input type="checkbox" value="spa"> Spanish</label>
              <label><input type="checkbox" value="fra"> French</label>
              <label><input type="checkbox" value="deu"> German</label>
              <label><input type="checkbox" value="chi_sim"> Chinese</label>
            </div>
          </div>
          <button id="extractBtn" class="primary-btn">🔍 Extract Text</button>
          
          <div id="ocrLoading" class="loading-area hidden">
            <div class="spinner"></div>
            <div id="ocrProgressText">Reading text...</div>
            <div class="progress-bar-container">
              <div id="ocrProgressBar" class="progress-bar"></div>
            </div>
          </div>

          <textarea id="resultText" placeholder="Extracted text will appear here..." readonly></textarea>
          
          <div class="action-buttons">
            <button id="copyBtn" class="secondary-btn" disabled>📋 Copy Text</button>
            <button id="translateBtn" class="secondary-btn" disabled>🌐 Translate</button>
            <button id="searchBtn" class="secondary-btn" disabled>🔎 Search</button>
          </div>
        </div>

        <div class="tab-content" id="imageTab">
          <div class="preview-area">
            <canvas id="previewCanvas"></canvas>
          </div>
          <p class="preview-text">Preview of selected region (or full frame)</p>
          <div class="action-buttons vertical">
            <button id="downloadJpgBtn" class="primary-btn">⬇️ Download as JPG</button>
            <button id="downloadPngBtn" class="secondary-btn">⬇️ Download as PNG</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="overlay.js"></script>
</body>
</html>
